<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk Fisik</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="./products.js"></script>

<style>
body {
  background: linear-gradient(180deg, #0f172a, #020617);
  color: #e5e7eb;
}

.card {
  background: #111827;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  overflow: hidden;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(99,102,241,0.25);
}

.btn {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
}

/* skeleton */
.skeleton {
  background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
}

@keyframes loading {
  0% { background-position: 200% 0 }
  100% { background-position: -200% 0 }
}
</style>
</head>

<body class="p-4">

<h1 class="text-lg font-semibold text-indigo-400 mb-4">
  🛍️ Produk Tersedia
</h1>

<div id="grid" class="grid grid-cols-2 gap-3 sm:grid-cols-3 md:grid-cols-4"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const grid = document.getElementById("grid");

  if(!products || products.length === 0){
    grid.innerHTML = "<p class='text-gray-400 text-center'>Produk kosong</p>";
    return;
  }

  products.forEach(p => {

    const badgeClass = p.condition === "Ori" 
      ? "bg-green-500" 
      : "bg-yellow-500";

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <div class="relative">
        <div class="skeleton w-full h-32 absolute"></div>

        <img 
          src="${p.image}" 
          loading="lazy"
          onload="this.previousElementSibling.style.display='none'"
          class="w-full h-32 object-cover"
        >

        <span class="absolute top-2 right-2 text-[10px] px-2 py-1 rounded ${badgeClass}">
          ${p.condition}
        </span>
      </div>

      <div class="p-3">
        <h2 class="text-sm font-semibold line-clamp-1">
          ${p.name}
        </h2>

        <p class="text-indigo-400 text-sm mt-1">
          Rp ${p.price.toLocaleString()}
        </p>

        <p class="text-xs text-gray-400 mt-1 line-clamp-2">
          ${p.description}
        </p>

        <p class="text-xs mt-1">
          Stok: ${p.stock}
        </p>

        <button onclick="orderWA('${p.name}','${p.condition}',${p.price})"
          class="btn mt-3 w-full py-2 rounded-lg text-xs">
          Beli
        </button>
      </div>
    `;

    grid.appendChild(el);
  });

});

// WA
function orderWA(nama, kondisi, harga){

  const pesan = `
Halo admin ${STORE.nama} 👋

Saya ingin membeli:

🛍 Produk: ${nama}
📦 Kondisi: ${kondisi}
💰 Harga: Rp ${harga.toLocaleString()}

Apakah masih tersedia?
`;

  const url = `https://wa.me/${STORE.whatsapp}?text=${encodeURIComponent(pesan)}`;
  window.open(url, "_blank");
}
</script>

</body>
</html>
