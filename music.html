<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player Glass</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: radial-gradient(circle at top, #0f172a, #000); }
    .glass { backdrop-filter: blur(20px); background: rgba(255,255,255,0.08); }
    .glow-dynamic { transition: box-shadow 0.5s ease; }
    .wet::after {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 40%),
                  radial-gradient(circle at 70% 60%, rgba(255,255,255,0.12), transparent 40%);
      mix-blend-mode: overlay; border-radius: 24px; pointer-events: none;
    }
    .rain::before {
      content: ""; position: absolute; inset: 0;
      background: url('https://i.ibb.co/7QpKsCX/rain.gif');
      opacity: 0.07; pointer-events: none; border-radius: 24px;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

<div id="playerCard" class="relative w-80 rounded-3xl p-4 glass shadow-2xl glow-dynamic rain wet">

  <button onclick="goHome()" class="mb-3 text-sm text-gray-300 hover:text-white">← Kembali</button>

  <!-- Cover -->
  <div class="rounded-2xl overflow-hidden">
    <img id="cover" src="./img/cover.jpg" class="w-full h-60 object-cover">
  </div>

  <!-- Info -->
  <div class="mt-4">
    <p class="text-sm text-gray-300">Spotify</p>
    <h2 id="title" class="text-lg font-semibold">Judul Lagu</h2>
    <p id="artist" class="text-gray-400 text-sm">Artist</p>
  </div>

  <!-- Progress -->
  <div class="mt-4">
    <input type="range" id="progress" value="0" class="w-full">
    <div class="flex justify-between text-xs text-gray-400 mt-1">
      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="flex justify-center items-center gap-6 mt-4 text-xl">
    <button onclick="prev()">⏮</button>
    <button onclick="togglePlay()" id="playBtn" class="text-3xl">▶</button>
    <button onclick="next()">⏭</button>
  </div>

  <!-- Volume -->
  <div class="mt-4">
    <input type="range" id="volume" min="0" max="1" step="0.01" value="1" class="w-full">
  </div>

  <!-- Playlist -->
  <div class="mt-4 space-y-2 max-h-32 overflow-y-auto">
    <div id="list"></div>
  </div>

  <!-- Dana Kaget -->
  <div class="mt-4">
    <button onclick="openDaget()"
      class="w-full p-3 rounded-2xl glass text-white font-semibold hover:bg-white/10 transition">
      🎁 Ambil Dana Kaget
    </button>
  </div>

</div>

<audio id="audio"></audio>

<script>
const playlist = [
  {title:"Lilakne Lungamu", artist:"NDX A.K.A", src:"./img/music1.mp3", cover:"./img/cover.jpg"},
  {title:"Lagu Kedua", artist:"Artist 2", src:"music2.mp3", cover:"cover2.jpg"},
  {title:"Lagu Ketiga", artist:"Artist 3", src:"music3.mp3", cover:"cover3.jpg"},
  {title:"Lagu Keempat", artist:"Artist 4", src:"music4.mp3", cover:"cover4.jpg"},
  {title:"Lagu Kelima", artist:"Artist 5", src:"music5.mp3", cover:"cover5.jpg"}
];

let index = 0;
const audio = document.getElementById("audio");
const progress = document.getElementById("progress");
const current = document.getElementById("current");
const duration = document.getElementById("duration");
const playBtn = document.getElementById("playBtn");
const volume = document.getElementById("volume");
const cover = document.getElementById("cover");
const card = document.getElementById("playerCard");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const list = document.getElementById("list");

function loadSong(i){
  const song = playlist[i];
  audio.src = song.src;
  cover.src = song.cover;
  title.textContent = song.title;
  artist.textContent = song.artist;
  setGlow(song.cover);
}

function togglePlay(){
  if(audio.paused){ audio.play(); playBtn.textContent="⏸"; }
  else { audio.pause(); playBtn.textContent="▶"; }
}

function prev(){ index = (index-1+playlist.length)%playlist.length; loadSong(index); audio.play(); }
function next(){ index = (index+1)%playlist.length; loadSong(index); audio.play(); }

function formatTime(sec){ let m=Math.floor(sec/60); let s=Math.floor(sec%60); return m+":"+(s<10?"0":"")+s; }

audio.addEventListener("loadedmetadata", ()=>{ duration.textContent = formatTime(audio.duration); });
audio.addEventListener("timeupdate", ()=>{
  progress.value = (audio.currentTime/audio.duration)*100;
  current.textContent = formatTime(audio.currentTime);
});

progress.addEventListener("input", ()=>{ audio.currentTime = (progress.value/100)*audio.duration; });
volume.addEventListener("input", ()=>{ audio.volume = volume.value; });

function goHome(){ window.location.href = "index.html"; }

// Playlist render
playlist.forEach((s,i)=>{
  const el = document.createElement("div");
  el.className = "p-2 bg-white/10 rounded-lg cursor-pointer text-sm";
  el.textContent = s.title;
  el.onclick = ()=>{ index=i; loadSong(i); audio.play(); };
  list.appendChild(el);
});

// Glow from cover
function setGlow(src){
  const img = new Image();
  img.crossOrigin="Anonymous";
  img.src = src;
  img.onload = ()=>{
    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");
    canvas.width=img.width; canvas.height=img.height;
    ctx.drawImage(img,0,0);
    const data=ctx.getImageData(0,0,img.width,img.height).data;
    let r=0,g=0,b=0,c=0;
    for(let i=0;i<data.length;i+=40){ r+=data[i]; g+=data[i+1]; b+=data[i+2]; c++; }
    r=Math.floor(r/c); g=Math.floor(g/c); b=Math.floor(b/c);
    card.style.boxShadow=`0 0 20px rgba(${r},${g},${b},0.3),0 0 40px rgba(${r},${g},${b},0.25),0 0 60px rgba(${r},${g},${b},0.2)`;
  };
}

// ===== DANA KAGET =====
function openDaget() {
  // efek glow emas sebelum buka link
  card.style.boxShadow += ", 0 0 80px rgba(255,215,0,0.6)";
  
  setTimeout(() => {
    window.open("https://link.dana.id/danakaget?c=sgx459uqw&r=hZLvkJ&orderId=20260422101214177815010300166758674446288", "_blank");
  }, 300);
}

// init
loadSong(index);
</script>

</body>
</html>
