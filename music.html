<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk Digital</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
  color: #e5e7eb;
  font-family: system-ui, sans-serif;
}

/* CARD */
.card {
  background: #111827;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(99,102,241,0.25);
}

/* BUTTON */
.btn-primary {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  transition: 0.3s;
}

.btn-primary:hover {
  opacity: 0.9;
}

.text-muted {
  color: #9ca3af;
}
</style>
</head>

<body class="p-6">

<h1 class="text-lg font-semibold text-indigo-400 mb-6">
  Produk Digital
</h1>

<!-- GRID -->
<div id="grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

<script>
// ================= DATA PRODUK =================
const products = [
  {
    id: 1,
    name: "Video Editing",
    price: 50000,
    desc: "Jasa edit video profesional (cinematic, reels, dll)",
    img: "https://cdn-icons-png.flaticon.com/512/727/727245.png"
  },
  {
    id: 2,
    name: "Paid Edit",
    price: 30000,
    desc: "Edit cepat dan rapi untuk konten sosial media",
    img: "https://cdn-icons-png.flaticon.com/512/1828/1828884.png"
  },
  {
    id: 3,
    name: "Poster Design",
    price: 25000,
    desc: "Desain poster aesthetic & modern",
    img: "https://cdn-icons-png.flaticon.com/512/1828/1828919.png"
  },
  {
    id: 4,
    name: "Thumbnail",
    price: 20000,
    desc: "Thumbnail YouTube menarik dan CTR tinggi",
    img: "https://cdn-icons-png.flaticon.com/512/1828/1828925.png"
  },
  {
    id: 5,
    name: "Akun Premium",
    price: 15000,
    desc: "Akun premium murah & terpercaya",
    img: "https://cdn-icons-png.flaticon.com/512/847/847969.png"
  }
];

// ================= RENDER =================
const grid = document.getElementById("grid");

products.forEach(p => {
  const el = document.createElement("div");

  el.className = "card p-4";

  el.innerHTML = `
    <div class="flex justify-center mb-3">
      <img src="${p.img}" class="w-12 h-12">
    </div>

    <h2 class="text-sm font-semibold text-center">${p.name}</h2>
    <p class="text-indigo-400 text-xs text-center mt-1">
      Rp ${p.price.toLocaleString()}
    </p>

    <p class="text-muted text-xs text-center mt-2">
      ${p.desc}
    </p>

    <button onclick="addToCart(${p.id})"
      class="btn-primary mt-3 w-full py-2 rounded-lg text-xs">
      + Keranjang
    </button>
  `;

  grid.appendChild(el);
});

// ================= CART SYSTEM =================
function addToCart(id){
  const product = products.find(p => p.id === id);

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push(product);

  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartBadge();

  alert(product.name + " ditambahkan ke keranjang");
}

// ================= UPDATE BADGE =================
function updateCartBadge(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];

  const badge = document.getElementById("cartCount");
  if(badge){
    badge.textContent = cart.length;
  }
}

// INIT
updateCartBadge();
</script>

</body>
</html>
