<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk Fisik</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg, #0f172a, #020617);
  color: #e5e7eb;
}

.card {
  background: #111827;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  overflow: hidden;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(99,102,241,0.25);
}

.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 6px;
}

.badge-second {
  background: #f59e0b;
}

.badge-ori {
  background: #10b981;
}

.btn {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
}
</style>

<script src="products.js"></script>
</head>

<body class="p-6">

<h1 class="text-lg font-semibold text-indigo-400 mb-6">
  🛍️ Produk Tersedia
</h1>

<div id="grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

<script>
const grid = document.getElementById("grid");

products.forEach(p => {

  const badgeClass = p.condition === "Ori" ? "badge-ori" : "badge-second";

  const el = document.createElement("div");
  el.className = "card";

  el.innerHTML = `
    <img src="${p.image}" class="w-full h-36 object-cover">

    <div class="p-3">
      <div class="flex justify-between items-center">
        <h2 class="text-sm font-semibold">${p.name}</h2>
        <span class="badge ${badgeClass}">${p.condition}</span>
      </div>

      <p class="text-indigo-400 text-sm mt-1">
        Rp ${p.price.toLocaleString()}
      </p>

      <p class="text-xs text-gray-400 mt-1">
        ${p.description}
      </p>

      <p class="text-xs mt-1">
        Stok: ${p.stock}
      </p>

      <button onclick="orderWA('${p.name}', '${p.condition}', ${p.price})"
        class="btn mt-3 w-full py-2 rounded-lg text-xs">
        Beli Sekarang
      </button>
    </div>
  `;

  grid.appendChild(el);
});

// ================= WHATSAPP =================
function orderWA(nama, kondisi, harga){

  const pesan = `
Halo admin ${STORE.nama} 👋

Saya ingin membeli:

🛍 Produk: ${nama}
📦 Kondisi: ${kondisi}
💰 Harga: Rp ${harga.toLocaleString()}

Apakah masih tersedia?
`;

  const url = `https://wa.me/${STORE.whatsapp}?text=${encodeURIComponent(pesan)}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>
