<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Produk</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #0f172a, #000);
    }

    .glass {
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08);
    }

    .card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(255,255,255,0.15);
    }

    .rain::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://i.ibb.co/7QpKsCX/rain.gif');
      opacity: 0.05;
      border-radius: 24px;
      pointer-events: none;
    }
  </style>
</head>

<body class="text-white p-6">

<h1 class="text-xl mb-6 text-center">🛍️ Katalog Produk</h1>

<!-- GRID -->
<div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>

<script>
// ================= DATA =================
const products = [
  {
    name: "Lampu LED RGB",
    price: "Rp 45.000",
    category: "Aksesoris",
    desc: "Lampu aesthetic dengan 16 warna, cocok untuk kamar atau setup gaming.",
    img: "./img/product1.jpg"
  },
  {
    name: "Headset Gaming",
    price: "Rp 120.000",
    category: "Elektronik",
    desc: "Suara jernih dengan mic, nyaman dipakai lama.",
    img: "./img/product2.jpg"
  },
  {
    name: "Keyboard RGB",
    price: "Rp 150.000",
    category: "Komputer",
    desc: "Keyboard dengan efek RGB dan feel seperti mechanical.",
    img: "./img/product3.jpg"
  },
  {
    name: "Mouse Wireless",
    price: "Rp 80.000",
    category: "Komputer",
    desc: "Ringan, tanpa kabel, cocok untuk kerja dan gaming.",
    img: "./img/product4.jpg"
  },
  {
    name: "Lampu Meja Minimalis",
    price: "Rp 95.000",
    category: "Dekorasi",
    desc: "Desain minimalis untuk meja kerja atau belajar.",
    img: "./img/product5.jpg"
  }
];

// ================= RENDER =================
const grid = document.getElementById("grid");

products.forEach(p => {

  const card = document.createElement("div");
  card.className = "glass rain card rounded-2xl p-4";

  card.innerHTML = `
    <div class="rounded-xl overflow-hidden">
      <img src="${p.img}" class="w-full h-40 object-cover">
    </div>

    <div class="mt-3">
      <p class="text-xs text-gray-400">${p.category}</p>
      <h2 class="text-md font-semibold">${p.name}</h2>
      <p class="text-white text-sm mt-1">${p.price}</p>
      <p class="text-gray-400 text-xs mt-1">${p.desc}</p>
    </div>

    <button onclick="buyProduct('${p.name}')"
      class="mt-3 w-full py-2 rounded-lg bg-white/20 hover:bg-white/30 text-sm transition">
      🛒 Beli
    </button>
  `;

  grid.appendChild(card);
});

// ================= BELI =================
function buyProduct(name){
  window.open(
    "https://wa.me/62xxxx?text=Halo%20saya%20ingin%20membeli%20" + encodeURIComponent(name),
    "_blank"
  );
}
</script>

</body>
</html>
