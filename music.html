<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produk Digital</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- WAJIB: CONFIG -->
<script src="./js/config.js"></script>

<style>
body {
  background: linear-gradient(180deg, #0f172a, #020617);
  color: #e5e7eb;
}

/* CARD */
.card {
  background: #111827;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
  transition: 0.25s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(99,102,241,0.25);
}

/* BUTTON */
.btn {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
}

/* MODAL */
.modal-bg {
  background: rgba(0,0,0,0.7);
}
</style>
</head>

<body class="p-6">

<h1 class="text-lg font-semibold text-indigo-400 mb-6">
  Produk Digital
</h1>

<!-- GRID -->
<div id="grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 modal-bg flex items-center justify-center hidden">
  <div class="bg-gray-900 p-5 rounded-xl w-80">
    <h2 id="modalTitle" class="text-md font-semibold mb-3"></h2>

    <div id="variantList" class="space-y-2"></div>

    <button onclick="closeModal()" class="mt-4 text-sm text-gray-400">
      Tutup
    </button>
  </div>
</div>

<script>
// ================= CEK CONFIG =================
if(typeof productsData === "undefined"){
  document.getElementById("grid").innerHTML =
    "<p class='text-center text-gray-400'>Config belum dimuat</p>";
}

// ================= AMBIL DATA =================
const products = (productsData && productsData["Produk Digital"]) || [];

const grid = document.getElementById("grid");

// ================= RENDER =================
if(products.length === 0){
  grid.innerHTML = "<p class='text-center text-gray-400'>Produk kosong</p>";
}

products.forEach(p => {

  const el = document.createElement("div");
  el.className = "card p-4";

  el.innerHTML = `
    <div class="flex justify-center text-indigo-400 text-3xl mb-3">
      <i class="${p.icon}"></i>
    </div>

    <h2 class="text-sm font-semibold text-center">${p.name}</h2>

    <p class="text-xs text-gray-400 text-center mt-2">
      ${p.description}
    </p>

    <button onclick="openModal(${p.id})"
      class="btn mt-3 w-full py-2 rounded-lg text-xs">
      Pilih
    </button>
  `;

  grid.appendChild(el);
});

// ================= MODAL =================
function openModal(id){
  const product = products.find(p => p.id === id);

  if(!product) return;

  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modalTitle").textContent = product.name;

  const list = document.getElementById("variantList");
  list.innerHTML = "";

  product.variants.forEach(v => {
    const item = document.createElement("div");

    item.className = "flex justify-between bg-gray-800 p-2 rounded text-xs";

    item.innerHTML = `
      <span>${v.name}</span>
      <span>Rp ${Number(v.price).toLocaleString()}</span>
      <button onclick="addToCart('${product.name}','${v.name}',${v.price})"
        class="bg-indigo-500 px-2 rounded">
        +
      </button>
    `;

    list.appendChild(item);
  });
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

// ================= CART =================
function addToCart(nama, varian, harga){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  let existing = cart.find(item => item.nama === nama && item.varian === varian);

  if(existing){
    existing.qty += 1;
  } else {
    cart.push({
      nama: nama,
      varian: varian,
      harga: Number(harga),
      qty: 1
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Ditambahkan ke keranjang");
}
</script>

</body>
</html>
